services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:5173"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-doculens}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-doculens}
      RETRIEVAL_BACKEND: ${RETRIEVAL_BACKEND:-lexical_fallback}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local_hashing}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-doculens-local-hashing-v1}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-384}
      EMBEDDING_STRICT: ${EMBEDDING_STRICT:-false}
      AI_PROVIDER: minimax
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      MINIMAX_BASE_URL: ${MINIMAX_BASE_URL:-https://api.minimax.io/v1}
      MINIMAX_MODEL: ${MINIMAX_MODEL:-MiniMax-M3}
      JWT_SECRET: ${JWT_SECRET}
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-doculens}
      POSTGRES_USER: ${POSTGRES_USER:-doculens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-doculens} -d $${POSTGRES_DB:-doculens}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
