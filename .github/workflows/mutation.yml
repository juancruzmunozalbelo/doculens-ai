name: Mutation Testing

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Bounded mutation mode to run
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - unit
          - integration
          - e2e
      scope:
        description: Explicit mutation scope under apps/api/src/server or apps/web/src
        required: false
        default: apps/api/src/server/security
        type: string

permissions:
  contents: read

concurrency:
  group: mutation-${{ github.ref }}-${{ inputs.mode }}
  cancel-in-progress: true

jobs:
  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright for E2E mutation
        if: inputs.mode == 'e2e'
        run: npx playwright install --with-deps chromium
      - name: Run bounded mutation command
        env:
          MUTATION_MODE: ${{ inputs.mode }}
          MUTATION_SCOPE: ${{ inputs.scope }}
        run: |
          case "$MUTATION_MODE" in
            smoke) npm run mutation:smoke -- --scope "$MUTATION_SCOPE" ;;
            unit) npm run mutation:unit -- --scope "$MUTATION_SCOPE" ;;
            integration) npm run mutation:integration -- --scope "$MUTATION_SCOPE" ;;
            e2e) npm run mutation:e2e -- --scope "$MUTATION_SCOPE" ;;
            *) echo "Unsupported mutation mode" >&2; exit 2 ;;
          esac
      - name: Upload mutation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-${{ inputs.mode }}
          path: |
            reports/mutation
            mutation-report.html
          retention-days: 5
