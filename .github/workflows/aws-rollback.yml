name: AWS Rollback Demo

on:
  workflow_dispatch:
    inputs:
      rollback_target:
        description: Reviewed ECS task definition revision or image_uri to restore
        required: true
        type: string
      cluster:
        description: ECS cluster name
        required: true
        type: string
      service:
        description: ECS service name
        required: true
        type: string
      expected_account:
        description: Expected AWS demo account id
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: aws-demo-rollback
  cancel-in-progress: false

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment:
      name: aws-demo
    timeout-minutes: 20
    env:
      AWS_REGION_VALUE: ${{ vars.AWS_REGION || 'us-east-1' }}
      EXPECTED_ACCOUNT: ${{ inputs.expected_account }}
      ROLLBACK_CLUSTER: ${{ inputs.cluster }}
      ROLLBACK_SERVICE: ${{ inputs.service }}
      ROLLBACK_TARGET: ${{ inputs.rollback_target }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEMO_ROLLBACK_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Create ephemeral named AWS profile
        run: |
          aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID" --profile doculens-demo
          aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY" --profile doculens-demo
          aws configure set aws_session_token "$AWS_SESSION_TOKEN" --profile doculens-demo
          aws configure set region "$AWS_REGION_VALUE" --profile doculens-demo
      - name: Install Node for context guard
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Guard AWS context
        run: node scripts/checks/aws-context-guard.mjs --profile doculens-demo --region "$AWS_REGION_VALUE" --expected-account "$EXPECTED_ACCOUNT"
      - name: Roll back ECS service to reviewed target
        run: aws ecs update-service --cluster "$ROLLBACK_CLUSTER" --service "$ROLLBACK_SERVICE" --task-definition "$ROLLBACK_TARGET" --region "$AWS_REGION_VALUE"
      - name: Verify ECS service after rollback
        run: aws ecs describe-services --cluster "$ROLLBACK_CLUSTER" --services "$ROLLBACK_SERVICE" --region "$AWS_REGION_VALUE"
